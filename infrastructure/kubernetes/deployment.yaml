apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockx-backend
  labels:
    app: stockx-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stockx-backend
  template:
    metadata:
      labels:
        app: stockx-backend
    spec:
      containers:
      - name: backend
        image: stockx/backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: stockx-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: stockx-secrets
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
