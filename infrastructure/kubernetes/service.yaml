apiVersion: v1
kind: Service
metadata:
  name: stockx-backend-service
spec:
  type: LoadBalancer
  selector:
    app: stockx-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
