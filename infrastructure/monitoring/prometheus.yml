global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'stockx-backend'
    static_configs:
      - targets: ['localhost:3001']
    metrics_path: '/metrics'
    
  - job_name: 'stockx-frontend'
    static_configs:
      - targets: ['localhost:3000']
      
  - job_name: 'stockx-ai-services'
    static_configs:
      - targets: ['localhost:8000']
      metrics_path: '/metrics'
